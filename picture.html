<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arvi Jay</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./assets/favicon.png" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="w-full h-dvh h-dvh flex items-center justify-center text-white text-shadow-lg">
        <div class="bg-black/60 backdrop-blur-sm w-[90%] h-[90%] border-5 border-white/20 rounded-[70px] flex flex-col">

            <div
                class="h-fit py-5 px-6 w-[calc(100%-1rem)] mx-auto my-2 flex flex-row items-center justify-between bg-black rounded-full">
                <div class="flex flex-row items-center gap-5">
                    <img src="./assets/Tungpalan, Arvi Jay B.jpg" alt="Arvi Jay"
                        class="h-20 w-auto rounded-full shadow-lg">
                    <div class="grid grid-rows-2">
                        <div class="text-3xl w-full font-bold">Arvi Jay B. Tungpalan</div>
                        <div class="text-xl w-full">11-Tech Pro C</div>
                    </div>
                </div>
                <div class="text-5xl font-bold mr-5">Photos</div>
            </div>

            <div class="flex flex-col items-center justify-center overflow-y-auto">
                <div class="grid grid-cols-3 gap-3 overflow-y-auto w-full flex-1 p-5 rounded-3xl">
                    <img src="./photos/picture (1).jpg" alt="picture"
                        class="photo-thumb w-full aspect-square object-cover rounded-3xl cursor-pointer transition-transform hover:scale-101">
                    <img src="./photos/picture (2).jpg" alt="picture"
                        class="photo-thumb w-full aspect-square object-cover rounded-3xl cursor-pointer transition-transform hover:scale-101">
                    <img src="./photos/picture (3).jpg" alt="picture"
                        class="photo-thumb w-full aspect-square object-cover rounded-3xl cursor-pointer transition-transform hover:scale-101">
                    <img src="./photos/picture (4).jpg" alt="picture"
                        class="photo-thumb w-full aspect-square object-cover rounded-3xl cursor-pointer transition-transform hover:scale-101">
                    <img src="./photos/picture (5).jpg" alt="picture"
                        class="photo-thumb w-full aspect-square object-cover rounded-3xl cursor-pointer transition-transform hover:scale-101">
                    <img src="./photos/picture (6).jpg" alt="picture"
                        class="photo-thumb w-full aspect-square object-cover rounded-3xl cursor-pointer transition-transform hover:scale-101">
                </div>
                <a href="./skill.html"
                    class="hover:bg-white my-5 hover:text-black bg-black text-white hover:scale-120 py-2 px-4 rounded-full ">
                    <i class="fa-solid fa-caret-left"></i> Go Back</a>
            </div>

        </div>
    </div>
    </div>

    <div id="lightbox"
        class="fixed inset-0 bg-black/90 backdrop-blur-sm z-[9999] hidden items-center justify-center opacity-0 transition-opacity duration-300">
        <img id="lightbox-img" src="" alt="Fullscreen photo"
            class="max-w-[92%] max-h-[92%] object-contain rounded-2xl shadow-2xl">
        <button id="lightbox-close"
            class="absolute top-6 right-6 text-3xl w-12 h-12 flex items-center justify-center hover:scale-120 bg-black/10 text-white hover:bg-white/40 rounded-full transition">
            <i class="fa-solid fa-circle-minus"></i>
        </button>
    </div>

    <div
        class="loading fixed top-0 left-0 right-0 bottom-0 bg-black z-99999 flex flex-col gap-5 items-center justify-center ">
        <i class="fa-solid fa-circle-notch text-6xl text-white animate"></i>
        <span class="text-3xl text-white font-bold">Loading</span>
    </div>
    <script>
        const loadingScreen = document.querySelector(".loading")

        window.addEventListener("load", () => {
            setTimeout(() => {
                loadingScreen.classList.add("opacity-0", "pointer-events-none")

                loadingScreen.addEventListener("transitionend", () => {
                    loadingScreen.classList.add("hidden")
                }, { once: true })
            }, 500)
        })

        const lightbox = document.getElementById("lightbox")
        const lightboxImg = document.getElementById("lightbox-img")
        const lightboxClose = document.getElementById("lightbox-close")
        const thumbs = document.querySelectorAll(".photo-thumb")

        function openLightbox(src) {
            lightboxImg.src = src
            lightbox.classList.remove("hidden")
            lightbox.classList.add("flex")
            requestAnimationFrame(() => {
                lightbox.classList.remove("opacity-0")
            })
            document.body.style.overflow = "hidden"
        }

        function closeLightbox() {
            lightbox.classList.add("opacity-0")
            lightbox.addEventListener("transitionend", () => {
                lightbox.classList.add("hidden")
                lightbox.classList.remove("flex")
                lightboxImg.src = ""
            }, { once: true })
            document.body.style.overflow = ""
        }

        thumbs.forEach(img => {
            img.addEventListener("click", () => openLightbox(img.src))
        })

        lightboxClose.addEventListener("click", closeLightbox)
        lightbox.addEventListener("click", (e) => {
            if (e.target === lightbox) closeLightbox()
        })
    </script>
</body>

</html>
