<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arvi Jay</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="shortcut icon" href="../assets/favicon-16x16.png" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="../components/load.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>

<body>
    <div class="w-full h-dvh flex items-center justify-center text-white text-shadow-lg">
        <div class="bg-black/60 backdrop-blur-sm w-[98%] h-[98%] border-white/20 rounded-[50px] flex flex-col p-2">

            <div id="navbar" class="w-full"></div>

            <div class="flex flex-col items-center justify-start flex-1 overflow-y-auto">
                <div
                    class="flex-1 flex flex-col text-shadow-lg items-center justify-center text-center p-4 text-white w-full">
                    <div class="w-full bg-white gap-3 rounded-t-3xl p-3 flex flex-row items-center text-black">
                        <i class="fa-solid fa-link text-xl pl-2"></i>
                        <input type="text" name="url" id="url" class="text-white flex-1 bg-black rounded-full py-2 px-5"
                            value="https://www.example.com" placeholder="Enter url">
                        <i class="fa-solid fa-magnifying-glass p-3 rounded-full bg-black text-white" id="search"></i>
                    </div>
                    <div id="iframe" class="flex-1 w-full bg-white h-full rounded-b-3xl">
                    </div>
                </div>

                <a href="./index.html"
                    class="hover:bg-white w-fit my-2 hover:text-black bg-black text-white hover:scale-110 transition-all py-2 px-4 rounded-full flex items-center gap-2">
                    <i class="fa-solid fa-caret-left"></i> Go Back
                </a>
            </div>

        </div>
    </div>

    <div
        class="loading fixed top-0 left-0 right-0 bottom-0 bg-black z-99999 flex flex-col gap-5 items-center justify-center ">
        <img src="../assets/android-chrome-192x192.png" alt="image" class="animate-picture">
    </div>

    <script>
        initLoadingScreen()
        loadComponent("navbar", "../components/navbar.html", {
            title: "Iframe",
            imagePath: "../assets/Tungpalan, Arvi Jay B.jpg"
        })

        const iframe = document.getElementById("iframe");
        const input = document.getElementById("url");

        function show() {
            iframe.innerHTML = `<iframe src="${input.value}" class="w-full flex-1 h-full rounded-b-3xl"></iframe>`;
        }

        document.getElementById("search").addEventListener("click", () => {
            show();
        });

        input.addEventListener("keydown", e => {
            if (e.key === "Enter") {
                show();
            }
        });

        show();
    </script>
</body>

</html>
