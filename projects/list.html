<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arvi Jay</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="shortcut icon" href="../assets/favicon-16x16.png" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="../components/load.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>

<body>
    <div class="w-full h-dvh flex items-center justify-center text-white text-shadow-lg">
        <div
            class="bg-black/60 backdrop-blur-sm w-[90%] h-[90%] border-[5px] border-white/20 rounded-[70px] flex flex-col p-5">

            <div id="navbar"></div>

            <div class="flex flex-col items-center justify-start flex-1 overflow-y-auto">
                <div class="grid grid-cols-2 gap-3 text-2xl text-shadow-lg items-center justify-center text-center p-4 text-white w-full">

                    <div>
                        <h3>Unordered List</h3>
                        <ul class="list-disc pl-6 list-inside">
                            <li>Item 1</li>
                            <li>Item 2</li>
                            <li>Item 3</li>
                        </ul>
                    </div>

                    <div>
                        <h3>Ordered List</h3>
                        <ol class="list-decimal pl-6  list-inside">
                            <li>Item 1</li>
                            <li>Item 2</li>
                            <li>Item 3</li>
                        </ol>
                    </div>

                </div>

                <a href="./index.html"
                    class="hover:bg-white w-fit my-5 hover:text-black bg-black text-white hover:scale-110 transition-all py-2 px-4 rounded-full flex items-center gap-2">
                    <i class="fa-solid fa-caret-left"></i> Go Back
                </a>
            </div>

        </div>
    </div>

    <div
        class="loading fixed top-0 left-0 right-0 bottom-0 bg-black z-99999 flex flex-col gap-5 items-center justify-center ">
        <img src="../assets/android-chrome-192x192.png" alt="image" class="animate-picture">
    </div>

    <script>
        initLoadingScreen()
        loadComponent("navbar", "../components/navbar.html", {
            title: "List",
            imagePath: "../assets/Tungpalan, Arvi Jay B.jpg"
        })
    </script>
</body>

</html>
