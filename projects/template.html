<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arvi Jay</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="shortcut icon" href="../assets/favicon.png" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>

<body>
    <div class="w-full h-dvh flex items-center justify-center text-white text-shadow-lg">
        <div
            class="bg-black/60 backdrop-blur-sm w-[90%] h-[90%] border-[5px] border-white/20 rounded-[70px] flex flex-col p-5">

            <div
                class="h-fit py-5 px-6 w-[calc(100%-1rem)] mx-auto my-2 flex flex-row items-center justify-between bg-black rounded-full">
                <div class="flex flex-row items-center gap-5">
                    <img src="../assets/Tungpalan, Arvi Jay B.jpg" alt="Arvi Jay"
                        class="h-20 w-auto rounded-full shadow-lg">
                    <div class="grid grid-rows-2">
                        <div class="text-3xl w-full font-bold">Arvi Jay B. Tungpalan</div>
                        <div class="text-xl w-full">11-Tech Pro C</div>
                    </div>
                </div>
                <div class="text-5xl font-bold mr-5">List</div>
            </div>

            <div class="flex flex-col items-center justify-start flex-1 overflow-y-auto">
                <div class="grid grid-cols-2 gap-3 text-2xl text-shadow-lg items-center justify-center text-center p-4 text-white w-full">

                    <!-- Content -->
                     
                </div>

                <a href="./index.html"
                    class="hover:bg-white w-fit my-5 hover:text-black bg-black text-white hover:scale-110 transition-all py-2 px-4 rounded-full flex items-center gap-2">
                    <i class="fa-solid fa-caret-left"></i> Go Back
                </a>
            </div>

        </div>
    </div>

    <div
        class="loading fixed top-0 left-0 right-0 bottom-0 bg-black z-[99999] flex flex-col gap-5 items-center justify-center transition-opacity duration-500">
        <i class="fa-solid fa-circle-notch text-6xl text-white fa-spin"></i>
        <span class="text-3xl text-white font-bold">Loading</span>
    </div>

    <script>
        const loadingScreen = document.querySelector(".loading")

        window.addEventListener("load", () => {
            setTimeout(() => {
                loadingScreen.classList.add("opacity-0", "pointer-events-none")

                loadingScreen.addEventListener("transitionend", () => {
                    loadingScreen.classList.add("hidden")
                }, { once: true })
            }, 500)
        })
    </script>
</body>

</html>
