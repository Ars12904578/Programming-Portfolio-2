<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arvi Jay</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./assets/favicon.png" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="w-full h-dvh h-dvh flex items-center justify-center text-white text-shadow-lg">
        <div class="bg-black/60 backdrop-blur-sm w-[80%] h-[90%] border-5 border-white/20 rounded-[70px] flex flex-col">

            <div
                class="h-fit py-5 px-6 w-[calc(100%-1rem)] mx-auto my-2 flex flex-row items-center justify-between bg-black rounded-full">
                <div class="flex flex-row items-center gap-5">
                    <img src="./assets/Tungpalan, Arvi Jay B.jpg" alt="Arvi Jay"
                        class="h-20 w-auto rounded-full shadow-lg">
                    <div class="grid grid-rows-2">
                        <div class="text-3xl w-full font-bold">Arvi Jay B. Tungpalan</div>
                        <div class="text-xl w-full">11-Tech Pro C</div>
                    </div>
                </div>
                <div class="text-5xl font-bold mr-5">Skills</div>
            </div>

            <div class="flex flex-col items-center justify-center overflow-y-auto">
                <div class="flex-1 flex flex-row items-center justify-center gap-6 p-6">

                    <!-- Programming Card -->
                    <div
                        class="bg-white/10 backdrop-blur-md border border-white/20 rounded-3xl overflow-hidden w-72 shadow-xl">
                        <div class="relative h-40">
                            <img src="./assets/code.webp" alt="Programming" class="w-full h-full object-cover">
                            <div
                                class="absolute top-3 left-3 flex items-center justify-center w-9 h-9 bg-black/60 backdrop-blur-sm rounded-full">
                                <i class="fa-solid fa-code text-white text-sm"></i>
                            </div>
                        </div>
                        <div class="p-5">
                            <div class="text-2xl font-bold text-white mb-1">Programming</div>
                            <div class="text-white/70 text-sm mb-4">HTML, CSS, JS, Arduino C++, Node.js.</div>
                            <a href="./projects/index.html"
                                    class="hover:bg-white hover:text-black bg-black text-white py-2 px-4 rounded-full ">
                                    My Projects <i class="fa-solid fa-caret-right"></i></a>
                        </div>
                    </div>

                    <!-- Photography Card -->
                    <div
                        class="bg-white/10 backdrop-blur-md border border-white/20 rounded-3xl overflow-hidden w-72 shadow-xl">
                        <div class="relative h-40">
                            <img src="./assets/photo.webp" alt="Photography" class="w-full h-full object-cover">
                            <div
                                class="absolute top-3 left-3 flex items-center justify-center w-9 h-9 bg-black/60 backdrop-blur-sm rounded-full">
                                <i class="fa-solid fa-camera text-white text-sm"></i>
                            </div>
                        </div>
                        <div class="p-5">
                            <div class="text-2xl font-bold text-white mb-1">Photography</div>
                            <div class="text-white/70 text-sm mb-4">Portrait, Landscape, Macro, Adobe Lightroom.
                            </div>
                            <a href="./picture.html"
                                class="hover:bg-white hover:text-black bg-black text-white py-2 px-4 rounded-full ">My
                                Photos <i class="fa-solid fa-caret-right"></i></a>
                        </div>
                    </div>

                    <!-- Editing Card -->
                    <div
                        class="bg-white/10 backdrop-blur-md border border-white/20 rounded-3xl overflow-hidden w-72 shadow-xl">
                        <div class="relative h-40">
                            <img src="./assets/editing.webp" alt="Editing" class="w-full h-full object-cover">
                            <div
                                class="absolute top-3 left-3 flex items-center justify-center w-9 h-9 bg-black/60 backdrop-blur-sm rounded-full">
                                <i class="fa-solid fa-desktop text-white text-sm"></i>
                            </div>
                        </div>
                        <div class="p-5">
                            <div class="text-2xl font-bold text-white mb-1">Editing</div>
                            <div class="text-white/70 text-sm mb-4">Capcut, DaVinci Resolve, Canva, Blender.</div>
                        </div>
                    </div>

                </div>
                <a href="./index.html"
                    class="mb-10 hover:bg-white hover:text-black bg-black text-white hover:scale-120 py-2 px-4 rounded-full ">
                    <i class="fa-solid fa-caret-left"></i> Go Back</a>
            </div>

        </div>
    </div>
    </div>

    <div
        class="loading fixed top-0 left-0 right-0 bottom-0 bg-black z-99999 flex flex-col gap-5 items-center justify-center ">
        <i class="fa-solid fa-circle-notch text-6xl text-white animate"></i>
        <span class="text-3xl text-white font-bold">Loading</span>
    </div>
    <script>
        const loadingScreen = document.querySelector(".loading")

        window.addEventListener("load", () => {
            setTimeout(() => {
                loadingScreen.classList.add("opacity-0", "pointer-events-none")

                loadingScreen.addEventListener("transitionend", () => {
                    loadingScreen.classList.add("hidden")
                }, { once: true })
            }, 500)
        })
    </script>
</body>

</html>
